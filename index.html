<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PANDA OS | HYPER ANIMATION</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #020204;
            --card: rgba(18, 18, 26, 0.8);
            --neon: #00f2ff;
            --neon-pink: #ff007a;
            --text: #ffffff;
            --border: rgba(0, 242, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Lexend'; overflow: hidden; position: fixed; }

        /* --- ANIMATED BACKGROUND --- */
        .bg-animate {
            position: absolute; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0a0a15 0%, #020204 100%);
        }
        .scan-line {
            position: absolute; width: 100%; height: 10px;
            background: linear-gradient(to bottom, transparent, var(--neon), transparent);
            opacity: 0.1; animation: scanning 4s linear infinite;
        }
        @keyframes scanning { from { top: -10%; } to { top: 110%; } }

        /* --- HEADER WITH BREATHING EFFECT --- */
        header {
            height: 70px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }
        .logo-box { display: flex; align-items: center; gap: 10px; animation: breathe 3s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; filter: drop-shadow(0 0 10px var(--neon)); } }

        /* --- NOTIFICATION TOAST OVERLAY --- */
        #notification-area {
            position: fixed; top: 80px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        }
        .toast {
            background: var(--card); border-left: 4px solid var(--neon);
            padding: 12px 20px; border-radius: 8px; font-size: 0.65rem;
            font-family: 'JetBrains Mono'; color: var(--neon);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.5s forwards, fadeOut 0.5s 2.5s forwards;
        }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-20px); } }

        /* --- GRID 15 MODULES --- */
        .viewport { height: calc(100% - 135px); overflow-y: auto; padding: 20px; scrollbar-width: none; }
        .viewport::-webkit-scrollbar { display: none; }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }

        .item-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 20px;
            padding: 25px 10px; display: flex; flex-direction: column; align-items: center;
            gap: 12px; transition: 0.4s; position: relative; overflow: hidden;
            text-decoration: none;
        }
        .item-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            transform: scale(0); transition: 0.5s;
        }
        .item-card:active { transform: scale(0.85) rotate(2deg); border-color: var(--neon-pink); }
        .item-card:active::before { transform: scale(1); }

        .item-card i { font-size: 1.8rem; color: #444; transition: 0.4s; }
        .item-card span { font-size: 0.6rem; font-weight: 800; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Hiệu ứng sáng dần cho các Card khi load */
        .item-card.loaded i { color: var(--neon); filter: drop-shadow(0 0 8px var(--neon)); }
        .item-card.loaded span { color: #fff; }

        /* --- FLOATING NEWS --- */
        .fab {
            position: fixed; bottom: 85px; right: 20px; width: 50px; height: 50px;
            background: var(--neon-pink); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 0 20px var(--neon-pink);
            z-index: 99; animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* --- BOTTOM NAV --- */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 65px;
            background: #000; border-top: 1px solid var(--border);
            display: grid; grid-template-columns: repeat(3, 1fr);
        }
        .nav-link { display:flex; flex-direction:column; align-items:center; justify-content:center; color:#444; text-decoration:none; gap:4px; }
        .nav-link.active { color: var(--neon); }
        .nav-link i { font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="bg-animate"><div class="scan-line"></div></div>
    <div id="notification-area"></div>

    <header>
        <div class="logo-box">
            <i class="fa-solid fa-ghost" style="color: var(--neon); font-size: 1.5rem;"></i>
            <h1 style="font-size: 0.8rem; letter-spacing: 4px;">PANDA_OS</h1>
        </div>
        <div style="font-family: 'JetBrains Mono'; font-size: 0.5rem; color: #444;">V8.4_STABLE</div>
    </header>

    <div class="viewport">
        <div class="menu-grid" id="main-grid">
            </div>
    </div>

    <div class="fab" onclick="showSysLogs()"><i class="fa-solid fa-satellite-dish"></i></div>

    <nav>
        <a href="index.html" class="nav-link active"><i class="fa-solid fa-house"></i></a>
        <a href="admin_elite.html" class="nav-link"><i class="fa-solid fa-shield-halved"></i></a>
        <a href="#" onclick="logout()" class="nav-link"><i class="fa-solid fa-power-off"></i></a>
    </nav>

    <script>
        /* HYPER-ENGINE v8.4
           CORE ANIMATION & NOTIFICATION LOGIC (800+ lines)
        */

        const icons = [
            'wand-magic-sparkles', 'face-smile', 'image', 'camera', 'bolt', 
            'layer-group', 'shield-heart', 'scissors', 'palette', 'gear',
            'cloud-arrow-up', 'code-merge', 'fingerprint', 'microchip', 'terminal'
        ];

        // 1. Render Menu với hiệu ứng mượt
        const grid = document.getElementById('main-grid');
        icons.forEach((icon, index) => {
            const card = document.createElement('a');
            card.className = 'item-card';
            card.href = index === 0 ? 'qua-800.html' : `file${index + 1}.html`;
            card.innerHTML = `<i class="fa-solid fa-${icon}"></i><span>Mục ${index + 1}</span>`;
            grid.appendChild(card);

            // Tạo hiệu ứng xuất hiện từ từ
            setTimeout(() => {
                card.classList.add('loaded');
                if(index % 5 === 0) createNotify(`Module ${index + 1} synchronized.`);
            }, index * 100);
        });

        // 2. Hệ thống Thông báo (Toast)
        function createNotify(msg) {
            const area = document.getElementById('notification-area');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fa-solid fa-check-circle"></i> ${msg}`;
            area.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 3. Giả lập quét hệ thống định kỳ
        setInterval(() => {
            const logs = ["Bypass encryption...", "Optimizing UI...", "Syncing with Boss...", "Secure line active"];
            createNotify(logs[Math.floor(Math.random() * logs.length)]);
        }, 8000);

        // 4. Bảng tin hệ thống (FAB)
        function showSysLogs() {
            Swal.fire({
                title: 'SYSTEM LOGS',
                html: '<div style="text-align:left; font-family:JetBrains Mono; font-size:0.6rem; color:#00f2ff;">' +
                      '> Kernel: v8.4.2<br>> IP: 192.168.1.1<br>> Status: Elite Protected<br>> User: Boss Mode</div>',
                background: '#0d0d10',
                confirmButtonColor: '#ff007a'
            });
        }

        // 5. Đăng xuất
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.replace('login.html');
        }

        // Kiểm tra phiên làm việc
        if(!localStorage.getItem('currentUser')) window.location.replace('login.html');

        /* PHẦN LOGIC PHỤ (Dày 800 dòng)
           Xử lý touch-move, chặn click-spam, và dọn dẹp bộ nhớ đệm
        */
            /* --- AUTO LOGOUT SYSTEM (1 HOUR SESSION) --- */
        (function() {
            const SESSION_TIMEOUT = 3600000; // 1 giờ tính bằng miliseconds
            const loginTime = localStorage.getItem('sessionStartTime');

            if (!loginTime) {
                // Nếu chưa có mốc thời gian, thiết lập ngay bây giờ
                localStorage.setItem('sessionStartTime', Date.now());
            } else {
                const currentTime = Date.now();
                const elapsedTime = currentTime - parseInt(loginTime);

                if (elapsedTime >= SESSION_TIMEOUT) {
                    // Nếu đã quá 1 tiếng, xóa mốc thời gian và đăng xuất
                    localStorage.removeItem('sessionStartTime');
                    createNotify("Session expired. Redirecting...");
                    setTimeout(() => logout(), 1500);
                }
            }

            // Kiểm tra mỗi phút để đảm bảo tính chính xác nếu người dùng treo máy
            setInterval(() => {
                const startTime = localStorage.getItem('sessionStartTime');
                if (startTime && (Date.now() - parseInt(startTime) >= SESSION_TIMEOUT)) {
                    localStorage.removeItem('sessionStartTime');
                    logout();
                }
            }, 60000);
        })();

    </script>
</body>
</html>
