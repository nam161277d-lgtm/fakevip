<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PANDA OS | FINAL LOCK</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --momo: #d82d8b; --bg: #050507; --panel: #121216; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Lexend', sans-serif; user-select: none; -webkit-user-select: none; touch-action: none; }
        body { background: var(--bg); color: #fff; overflow: hidden; position: fixed; width: 100vw; height: 100vh; display: flex; flex-direction: column; }

        .preview-box { flex: 1; background: #000; display: flex; justify-content: center; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
        #mainCanvas { max-height: 100%; max-width: 100%; object-fit: contain; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

        .editor-panel { height: 40vh; background: var(--panel); padding: 20px; border-radius: 25px 25px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .input-group { margin-bottom: 15px; }
        input[type="text"] { width: 100%; padding: 15px; background: #1a1a20; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 0.9rem; outline: none; margin-bottom: 10px; }
        input[type="text"]:focus { border-color: var(--momo); }
        
        .qr-btn { display: block; background: #222; padding: 15px; border-radius: 12px; text-align: center; border: 1px dashed var(--momo); color: var(--momo); font-size: 0.8rem; font-weight: 700; cursor: pointer; margin-bottom: 20px; }
        .btn-save { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 800; font-size: 0.9rem; background: var(--momo); color: #fff; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 5px 15px rgba(216, 45, 139, 0.3); }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="preview-box">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="editor-panel">
        <div class="input-group">
            <input type="text" id="phone" placeholder="Nhập số điện thoại..." oninput="render()">
            <input type="text" id="name" placeholder="Nhập họ và tên..." oninput="render()">
        </div>
        
        <label class="qr-btn" for="qr-input"><i class="fa-solid fa-qrcode"></i> CHỌN ẢNH QR</label>
        <input type="file" id="qr-input" hidden accept="image/*" onchange="loadQR(this)">

        <button class="btn-save" onclick="exportImg()">TẢI ẢNH THÀNH PHẨM</button>
    </div>

    <script>
        // CHỐNG ZOOM TUYỆT ĐỐI
        document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const imgBase = new Image();
        const imgQR = new Image();
        let qrLoaded = false;

        // TOẠ ĐỘ KHOÁ CỨNG CỦA BOSS
        const CONFIG = {
            width: 1284, height: 2778,
            name: { x: 708, y: 1841, size: 50 },
            phone: { x: 534, y: 1615, size: 50 },
            qr: { x: 642, y: 1941, size: 325 }
        };

        imgBase.src = 'anh3.JPEG'; 
        imgBase.onload = () => {
            canvas.width = CONFIG.width;
            canvas.height = CONFIG.height;
            render();
        };

        imgBase.onerror = () => {
            Swal.fire({ icon: 'error', title: 'THIẾU FILE', text: 'Hãy đảm bảo file "anh3.JPEG" nằm cùng thư mục!', background: '#121216', color: '#fff' });
        };

        function loadQR(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    imgQR.src = e.target.result;
                    imgQR.onload = () => { qrLoaded = true; render(); };
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imgBase, 0, 0, CONFIG.width, CONFIG.height);

            const name = (document.getElementById('name').value || "").toUpperCase();
            const phone = document.getElementById('phone').value || "";
            const timeVal = getSystemTime();

            // Vẽ Giờ hệ thống
            ctx.font = "bold 44px sans-serif";
            ctx.fillStyle = "#000";
            ctx.textAlign = "center";
            ctx.fillText(timeVal, 160, 95);

            // CÀI ĐẶT NAM CHÂM LỀ PHẢI
            ctx.textAlign = "right";
            ctx.fillStyle = "#333";

            // Vẽ SĐT
            ctx.font = CONFIG.phone.size + "px sans-serif";
            ctx.fillText(phone, CONFIG.phone.x, CONFIG.phone.y);

            // Vẽ Tên
            ctx.font = "bold " + CONFIG.name.size + "px sans-serif";
            ctx.fillText(name, CONFIG.name.x, CONFIG.name.y);

            // Vẽ QR Code (Đã chốt vị trí)
            if(qrLoaded) {
                const s = CONFIG.qr.size;
                const x = CONFIG.qr.x - s/2;
                const y = CONFIG.qr.y;
                ctx.drawImage(imgQR, x, y, s, s);
            }
        }

        function getSystemTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        function exportImg() {
            const dataUrl = canvas.toDataURL('image/png', 1.0);
            const link = document.createElement('a');
            link.download = `PANDA_FINAL_${Date.now()}.png`;
            link.href = dataUrl;
            link.click();
            Swal.fire({ icon: 'success', title: 'ĐÃ LƯU ẢNH', timer: 1500, showConfirmButton: false, background: '#121216', color: '#fff' });
        }
    </script>
</body>
</html>
