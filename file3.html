<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCANNER PRO v4 | PANDA OS</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --momo: #d82d8b; --bg: #000; --panel: #16161a; --text-dim: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Lexend', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; overflow: hidden; display: flex; flex-direction: column; height: 100vh; position: fixed; width: 100%; height: 100%; }
        
        /* PREVIEW AREA (CHỐNG ZOOM) */
        .preview { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; position: relative; overflow: hidden; }
        canvas { max-height: 98%; max-width: 98%; border: 1px solid #222; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.8); pointer-events: none; }

        /* CONTROLS (CUỘN NỘI BỘ) */
        .controls { height: 50vh; background: var(--panel); padding: 15px 20px; overflow-y: auto; touch-action: pan-y; border-radius: 25px 25px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.8); padding-bottom: 80px; }
        
        .cat-title { font-size: 0.65rem; color: var(--momo); font-weight: 800; margin: 15px 0 10px; text-transform: uppercase; letter-spacing: 2px; border-left: 3px solid var(--momo); padding-left: 8px; }

        .log-panel { background: #1a1a20; padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(0, 242, 255, 0.2); }
        .log-panel p { font-size: 0.7rem; color: #00f2ff; font-family: 'JetBrains Mono', monospace; line-height: 1.4; white-space: pre-wrap; word-break: break-all; }

        .ctrl-group { background: #1a1a20; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #222; }
        .ctrl-group label { display: flex; justify-content: space-between; font-size: 0.6rem; color: var(--text-dim); margin-bottom: 5px; font-weight: 700; }
        .ctrl-group label b { color: var(--momo); font-size: 0.85rem; }
        input[type="range"] { width: 100%; accent-color: var(--momo); margin-top: 5px; }
        
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input[type="text"] { width: 100%; padding: 12px; background: #222; border: 1px solid #333; color: #fff; border-radius: 10px; font-size: 0.8rem; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--momo); background: #2a2a2e; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="preview"><canvas id="canvas"></canvas></div>

<div class="controls">
    <div class="log-panel">
        <p>BOSS COPY TOÀN BỘ DÒNG NÀY GỬI TÔI:</p>
        <p id="final-log">NAME(X:?, Y:?, S:?) | PHONE(X:?, Y:?, S:?)</p>
    </div>

    <p class="cat-title">Dữ liệu TEST</p>
    <div class="input-row">
        <input type="text" id="inName" placeholder="Tên (Ví dụ: NGUYEN VAN A)" oninput="drawAll()">
        <input type="text" id="inPhone" placeholder="SĐT (Ví dụ: 0912345678)" oninput="drawAll()">
    </div>

    <p class="cat-title">Căn chỉnh HỌ TÊN</p>
    <div class="ctrl-group">
        <label>Ngang (X): <b id="vxn">1100</b></label>
        <input type="range" id="xn" min="0" max="1284" value="1100" oninput="drawAll()">
        <label>Dọc (Y): <b id="vyn">1180</b></label>
        <input type="range" id="yn" min="0" max="2778" value="1180" oninput="drawAll()">
        <label>Size: <b id="vsn">40</b></label>
        <input type="range" id="sn" min="10" max="150" value="40" oninput="drawAll()">
    </div>

    <p class="cat-title">Căn chỉnh SỐ ĐIỆN THOẠI</p>
    <div class="ctrl-group">
        <label>Ngang (X): <b id="vxp">1100</b></label>
        <input type="range" id="xp" min="0" max="1284" value="1100" oninput="drawAll()">
        <label>Dọc (Y): <b id="vyp">1050</b></label>
        <input type="range" id="yp" min="0" max="2778" value="1050" oninput="drawAll()">
        <label>Size: <b id="vsp">38</b></label>
        <input type="range" id="sp" min="10" max="150" value="38" oninput="drawAll()">
    </div>
</div>

<script>
    // --- CHỐNG ZOOM ---
    document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    
    const cvs = document.getElementById('canvas');
    const ctx = cvs.getContext('2d');
    const img = new Image();
    
    // Nạp phôi ảnh
    img.src = 'anh3.JPEG';

    // Cấu hình Canvas tỉ lệ 4K (iPhone Pro Max)
    cvs.width = 1284;
    cvs.height = 2778;

    img.onload = () => { drawAll(); };
    img.onerror = () => { Swal.fire({ icon: 'error', title: 'THIẾU FILE', text: 'Cần file "anh3.JPEG" trong cùng thư mục!', background: '#121216', color: '#fff' }); };

    function drawAll() {
        ctx.clearRect(0,0,1284,2778);
        
        // 1. Vẽ phôi nền (Fix chuẩn 1284x2778)
        ctx.drawImage(img, 0, 0, 1284, 2778);

        // 2. Lấy dữ liệu và Cập nhật nhãn
        const v = (id) => document.getElementById(id).value;
        const setLabel = (id, v) => document.getElementById('v'+id).innerText = v;

        const xn = parseInt(v('xn')), yn = parseInt(v('yn')), sn = parseInt(v('sn'));
        const xp = parseInt(v('xp')), yp = parseInt(v('yp')), sp = parseInt(v('sp'));

        setLabel('xn', xn); setLabel('yn', yn); setLabel('sn', sn);
        setLabel('xp', xp); setLabel('yp', yp); setLabel('sp', sp);

        // 3. Cập nhật Log Chuyên Nghiệp để Boss copy
        document.getElementById('final-log').innerText = `NAME(${xn}, ${yn}, ${sn}) | PHONE(${xp}, ${yp}, ${sp})`;

        // 4. Lấy dữ liệu TEST
        const nameVal = (document.getElementById('inName').value || "NGUYEN VAN A").toUpperCase();
        const phoneVal = document.getElementById('inPhone').value || "0912345678";
        
        // Giờ (Lấy giờ thật để test vị trí luôn)
        ctx.font = "bold 44px sans-serif"; ctx.fillStyle = "#000"; ctx.textAlign = "center";
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        ctx.fillText(timeStr, 160, 95);

        // --- 5. VẼ CHỮ (CĂN LỀ PHẢI TUYỆT ĐỐI) ---
        ctx.textAlign = "right"; // <--- ĐÂY LÀ CHÌA KHÓA!
        ctx.fillStyle = "#333";

        // Vẽ SĐT (Căn lề phải, trục X làm Anchor)
        ctx.font = sp + "px sans-serif";
        ctx.fillText(phoneVal, xp, yp);

        // Vẽ Tên (Căn lề phải, trục X làm Anchor)
        ctx.font = "bold " + sn + "px sans-serif";
        ctx.fillText(nameVal, xn, yn);
        
        // --- 6. VẼ QR (CHỐT CỐ ĐỊNH THEO TOẠ ĐỘ BOSS GỬI) ---
        // Toạ độ Boss gửi: X: 642, Y: 1941, Size: 325
        const qx = 642, qy = 1941, qs = 325;
        ctx.fillStyle = "rgba(216, 45, 139, 0.3)"; // Giả lập ô màu hồng
        ctx.fillRect(qx - qs/2, qy, qs, qs); // Trục X cần trừ nửa Size vì Boss lấy tâm
        ctx.strokeStyle = "#d82d8b"; ctx.lineWidth = 5;
        ctx.strokeRect(qx - qs/2, qy, qs, qs);
        
        // Nhãn ghi chú cố định (để Boss biết QR đã chốt)
        ctx.font = "bold 25px sans-serif"; ctx.fillStyle = "#ff007a"; ctx.textAlign = "center";
        ctx.fillText("QR LOCKED", qx, qy + qs/2 + 10);
    }
</script>
</body>
</html>
