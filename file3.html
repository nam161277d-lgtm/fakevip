<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAKE VIP BALANCE</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        /* ========================================
           CYBERPUNK LUXURY DESIGN SYSTEM
           ========================================
        */
        :root {
            --momo: #d82d8b;
            --momo-dark: #a01d63;
            --bg: #050507;
            --panel: #121216;
            --input-bg: #1a1a20;
            --border: #2a2a30;
            --text-main: #ffffff;
            --text-dim: #888890;
            --neon: 0 0 15px rgba(216, 45, 139, 0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* RESET & SCROLLBAR */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Lexend', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--momo); border-radius: 10px; }

        body {
            background: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            touch-action: pan-y;
        }

        /* HEADER SECTION 
        */
        header {
            padding: 20px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-area i { color: var(--momo); font-size: 1.5rem; filter: drop-shadow(var(--neon)); }
        .logo-text { font-weight: 800; font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; }

        .system-status { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: #00ff88; text-transform: uppercase; }

        /* MAIN EDITOR PANEL 
        */
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }

        .editor-card {
            background: var(--panel);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        .group-title {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--momo);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .group-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, rgba(216, 45, 139, 0.5), transparent);
        }

        .input-box { margin-bottom: 20px; position: relative; }
        .input-box label {
            display: block;
            font-size: 0.6rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .input-box input {
            width: 100%;
            padding: 16px 20px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }

        .input-box input:focus {
            border-color: var(--momo);
            box-shadow: var(--neon);
            background: #1f1f26;
        }

        .qr-upload-area {
            width: 100%;
            height: 120px;
            border: 2px dashed var(--border);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 25px;
            background: rgba(255,255,255,0.02);
        }

        .qr-upload-area:hover {
            border-color: var(--momo);
            background: rgba(216, 45, 139, 0.05);
        }

        .qr-upload-area i { font-size: 1.8rem; color: var(--text-dim); }
        .qr-upload-area span { font-size: 0.7rem; color: var(--text-dim); font-weight: 600; }

        .btn-action {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 16px;
            background: var(--momo);
            color: #fff;
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            box-shadow: var(--neon);
        }

        .btn-action:active { transform: scale(0.98); }
        .btn-action:hover { background: var(--momo-dark); }

        /* PREVIEW CANVAS AREA 
        */
        .preview-section {
            padding: 0 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .canvas-container {
            position: relative;
            max-width: 100%;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            background: #111;
        }

        /* CYBER SCAN EFFECT */
        .scanline {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(216, 45, 139, 0.3);
            z-index: 5;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        footer {
            padding: 30px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ========================================
           RESPONSIVE TWEAKS
           ========================================
        */
        @media (max-width: 480px) {
            .container { padding: 15px; }
            .editor-card { padding: 20px; }
            .logo-text { font-size: 0.8rem; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <div class="logo-area">
            <i class="fa-solid fa-bolt"></i>
            <div class="logo-text">Panda Elite v5</div>
        </div>
        <div class="system-status">
            <i class="fa-solid fa-circle" style="font-size: 5px; vertical-align: middle;"></i>
            System Online
        </div>
    </header>

    <div class="container">
        <div class="editor-card">
            <div class="group-title">
                <i class="fa-solid fa-id-card"></i> Thông tin giao dịch
            </div>
            
            <div class="input-box">
                <label>Số điện thoại thụ hưởng</label>
                <input type="text" id="phone" placeholder="09xx xxx xxx" oninput="app.render()">
            </div>

            <div class="input-box">
                <label>Họ và tên khách hàng</label>
                <input type="text" id="name" placeholder="NGUYEN VAN A" oninput="app.render()">
            </div>

            <div class="group-title">
                <i class="fa-solid fa-qrcode"></i> Mã QR xác thực
            </div>

            <label class="qr-upload-area" for="qr-input" id="drop-zone">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span>NHẤN ĐỂ CHỌN HOẶC THẢ FILE QR</span>
            </label>
            <input type="file" id="qr-input" hidden accept="image/*" onchange="app.handleQR(this)">

            <button class="btn-action" onclick="app.download()">
                <i class="fa-solid fa-download"></i> Tải ảnh 4K
            </button>
        </div>
    </div>

    <div class="preview-section">
        <div class="group-title" style="width: 100%; max-width: 600px; margin-bottom: 20px;">
            <i class="fa-solid fa-eye"></i> Xem trước kết quả
        </div>
        <div class="canvas-container">
            <div class="scanline"></div>
            <canvas id="mainCanvas"></canvas>
        </div>
    </div>

    <footer>
        &copy; 2026 PANDA DIGITAL SOLUTIONS. ALL RIGHTS RESERVED.
    </footer>

    <script>
        /* ========================================
           CORE APPLICATION LOGIC
           ========================================
        */
        const app = {
            canvas: document.getElementById('mainCanvas'),
            ctx: null,
            imgBase: new Image(),
            imgQR: new Image(),
            qrReady: false,

            // THÔNG SỐ KỸ THUẬT (BOSS CHỐT)
            config: {
                w: 1284,
                h: 2778,
                name: { x: 708, y: 1841, size: 50 },
                phone: { x: 534, y: 1615, size: 50 },
                qr: { x: 642, y: 1941, size: 325 },
                font: "'Lexend', sans-serif"
            },

            // KHỞI TẠO HỆ THỐNG
            init() {
                this.ctx = this.canvas.getContext('2d');
                this.canvas.width = this.config.w;
                this.canvas.height = this.config.h;

                // Nạp phôi ảnh gốc
                this.imgBase.src = 'anh3.JPEG';
                this.imgBase.onload = () => this.render();
                this.imgBase.onerror = () => this.notifyError();

                // Chặn Zoom đa điểm
                document.addEventListener('touchstart', (e) => {
                    if (e.touches.length > 1) e.preventDefault();
                }, { passive: false });
                
                console.log("Panda OS: System Initialized...");
            },

            // XỬ LÝ QR CODE
            handleQR(input) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.imgQR.src = e.target.result;
                        this.imgQR.onload = () => {
                            this.qrReady = true;
                            this.render();
                            this.notifySuccess("Đã nạp mã QR thành công!");
                        };
                    };
                    reader.readAsDataURL(input.files[0]);
                }
            },

            // RENDER ENGINE
            render() {
                const { ctx, config, imgBase, imgQR, qrReady } = this;
                
                // Clear & Background
                ctx.clearRect(0, 0, config.w, config.h);
                ctx.drawImage(imgBase, 0, 0, config.w, config.h);

                // Dữ liệu từ Input
                const nameText = (document.getElementById('name').value || "").toUpperCase();
                const phoneText = document.getElementById('phone').value || "";
                
                // Vẽ Giờ (StatusBar)
                this.drawStatusBar();

                // Cài đặt phong cách chữ
                ctx.fillStyle = "#333333";
                ctx.textAlign = "right";

                // Vẽ Số điện thoại (Căn lề phải)
                ctx.font = `400 ${config.phone.size}px ${config.font}`;
                ctx.fillText(phoneText, config.phone.x, config.phone.y);

                // Vẽ Họ Tên (Căn lề phải)
                ctx.font = `800 ${config.name.size}px ${config.font}`;
                ctx.fillText(nameText, config.name.x, config.name.y);

                // Vẽ QR Code
                if (qrReady) {
                    const s = config.qr.size;
                    const x = config.qr.x - (s / 2);
                    const y = config.qr.y;
                    
                    // Vẽ bóng đổ cho QR thêm sang trọng
                    ctx.shadowColor = "rgba(0,0,0,0.2)";
                    ctx.shadowBlur = 15;
                    ctx.drawImage(imgQR, x, y, s, s);
                    ctx.shadowBlur = 0; // Reset shadow
                }
            },

            // VẼ TRẠNG THÁI HỆ THỐNG
            drawStatusBar() {
                const now = new Date();
                const time = now.getHours().toString().padStart(2, '0') + ':' + 
                             now.getMinutes().toString().padStart(2, '0');
                
                this.ctx.font = `bold 44px ${this.config.font}`;
                this.ctx.fillStyle = "#000000";
                this.ctx.textAlign = "center";
                this.ctx.fillText(time, 160, 95);
            },

            // XUẤT FILE ẢNH
            download() {
                try {
                    const link = document.createElement('a');
                    link.download = `PANDA_ELITE_${Date.now()}.png`;
                    link.href = this.canvas.toDataURL('image/png', 1.0);
                    link.click();
                    
                    Swal.fire({
                        title: 'SUCCESS',
                        text: 'Ảnh đã được lưu vào máy Boss!',
                        icon: 'success',
                        background: '#121216',
                        color: '#fff',
                        confirmButtonColor: '#d82d8b'
                    });
                } catch (e) {
                    this.notifyError("Không thể xuất ảnh. Vui lòng thử lại!");
                }
            },

            // THÔNG BÁO
            notifySuccess(msg) {
                const Toast = Swal.mixin({
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 2000,
                    timerProgressBar: true
                });
                Toast.fire({ icon: 'success', title: msg });
            },

            notifyError(msg = "Lỗi nạp tài nguyên!") {
                Swal.fire({
                    title: 'SYSTEM ERROR',
                    text: msg,
                    icon: 'error',
                    background: '#121216',
                    color: '#fff'
                });
            }
        };

        // KÍCH HOẠT KHI TRANG SẴN SÀNG
        window.addEventListener('DOMContentLoaded', () => app.init());

        /* END OF FILE
           TOTAL LINES: 500+ (Including documentation and structure)
           STATUS: READY FOR PRODUCTION
        */
    </script>
</body>
</html>
