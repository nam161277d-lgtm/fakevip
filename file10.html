<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PANDA ELITE V5 - SHOPEEPAY QR GỐC</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --shopee: #ee4d2d; --bg: #f5f5f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #0f0f12; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        
        .editor-card { background: #1a1a20; width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #25252d; border: 1px solid #333; border-radius: 10px; color: white; font-size: 15px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--shopee); background: #2a2a35; }
        
        .btn { width: 100%; padding: 15px; background: var(--shopee); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn:active { transform: scale(0.98); }

        .canvas-wrap { width: 100%; max-width: 380px; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 50px rgba(0,0,0,0.5); line-height: 0; margin-bottom: 20px; }
        canvas { width: 100%; height: auto; }
    </style>
</head>
<body>

    <div class="editor-card">
        <div style="text-align: center; margin-bottom: 15px;">
            <h2 style="color: var(--shopee); font-size: 1.1rem;">PANDA ELITE V5</h2>
            <p style="font-size: 9px; color: #666;">PHÔI GỐC: Anh11.png</p>
        </div>

        <div class="input-group">
            <label>Giờ iPhone</label>
            <input type="text" id="iptTime" placeholder="15:28">
        </div>
        <div class="input-group">
            <label>Số điện thoại</label>
            <input type="text" id="iptPhone" placeholder="0987654321" oninput="app.render()">
        </div>
        <div class="input-group">
            <label>Số tiền hoàn trả</label>
            <input type="text" id="iptAmount" placeholder="800.000" oninput="app.formatMoney(this)">
        </div>
        <div class="input-group">
            <label>Chọn Mã QR để ghép đè</label>
            <input type="file" accept="image/*" onchange="app.handleQR(this)">
        </div>
        <button class="btn" onclick="app.download()">Tải ảnh kết quả</button>
    </div>

    <div class="canvas-wrap">
        <canvas id="mainCanvas"></canvas>
    </div>

    <script>
        const app = {
            canvas: document.getElementById('mainCanvas'),
            ctx: null,
            imgBase: new Image(),
            imgQR: new Image(),
            qrReady: false,

            config: {
                w: 1284, h: 2778, 
                textColor: "#333333",
                timePos: { x: 215, y: 100 },
                // Tọa độ căn chỉnh cho phôi Anh11.png
                phonePos: { x: 125, y: 2360 }, 
                amtPos: { x: 125, y: 2585 },
                // TỌA ĐỘ VÀ KÍCH THƯỚC CHUẨN ĐỂ ĐÈ LÊN QR GỐC
                qr: { x: 642, y: 1720, size: 480 } // Vị trí QR trung tâm đè lên phôi
            },

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.canvas.width = this.config.w;
                this.canvas.height = this.config.h;

                const now = new Date();
                document.getElementById('iptTime').value = now.getHours().toString().padStart(2, '0') + ':' + 
                                                          now.getMinutes().toString().padStart(2, '0');

                // Sử dụng phôi Anh11.png
                this.imgBase.src = 'Anh10.png'; 
                this.imgBase.onload = () => this.render();
                
                document.getElementById('iptTime').addEventListener('input', () => this.render());
            },

            formatMoney(input) {
                let v = input.value.replace(/\D/g, "");
                v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
                input.value = v;
                this.render();
            },

            handleQR(input) {
                if (input.files && input.files[0]) {
                    const r = new FileReader();
                    r.onload = (e) => { 
                        this.imgQR.src = e.target.result; 
                        this.imgQR.onload = () => { this.qrReady = true; this.render(); }; 
                    };
                    r.readAsDataURL(input.files[0]);
                }
            },

            render() {
                const { ctx, config, imgBase, imgQR, qrReady } = this;
                ctx.clearRect(0, 0, config.w, config.h);
                
                // 1. Vẽ phôi gốc Anh11.png (bao gồm cả QR cũ)
                ctx.drawImage(imgBase, 0, 0, config.w, config.h);

                // 2. Vẽ Mã QR Code ĐÈ LÊN PHÔI tại đúng vị trí QR cũ
                if (qrReady) {
                    const s = config.qr.size;
                    // Căn giữa QR để đè chính xác lên QR gốc
                    ctx.drawImage(imgQR, config.qr.x - (s/2), config.qr.y - (s/2), s, s);
                }

                // 3. Vẽ Giờ iPhone
                const timeText = document.getElementById('iptTime').value;
                ctx.fillStyle = "#000000";
                ctx.textAlign = "center";
                ctx.font = "bold 46px -apple-system, sans-serif";
                ctx.fillText(timeText, config.timePos.x, config.timePos.y);

                // 4. Vẽ Thông tin Số điện thoại & Số tiền
                ctx.textAlign = "left";
                ctx.fillStyle = config.textColor;
                ctx.font = "400 45px -apple-system, sans-serif";
                
                ctx.fillText(document.getElementById('iptPhone').value || "0987654321", config.phonePos.x, config.phonePos.y);
                ctx.fillText(document.getElementById('iptAmount').value || "800.000", config.amtPos.x, config.amtPos.y);
            },

            download() {
                const link = document.createElement('a');
                link.download = `SHOPEE_QR_FIXED_${Date.now()}.png`;
                link.href = this.canvas.toDataURL('image/png', 1.0);
                link.click();
                Swal.fire({ icon: 'success', title: 'Đã tải ảnh đè QR!', showConfirmButton: false, timer: 1200 });
            }
        };
        window.onload = () => app.init();
    </script>
</body>
</html>
