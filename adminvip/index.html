<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COMMAND CENTER | ELITE ADMIN</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* CSS ARCHITECTURE: FIXED VIEWPORT 800+ LINES */
        :root {
            --bg: #08080a;
            --card: #121215;
            --neon: #00f2ff;
            --danger: #ff3e3e;
            --success: #00ff88;
            --text: #e1e1e6;
            --border: rgba(255, 255, 255, 0.05);
        }

        /* Khóa cuộn ngang toàn hệ thống */
        html, body {
            overflow-x: hidden;
            width: 100%;
            height: 100%;
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            touch-action: pan-y; /* Chỉ cho phép cuộn dọc */
        }

        /* --- HEADER --- */
        header {
            height: 70px; background: rgba(18, 18, 21, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; position: sticky; top: 0; z-index: 1000;
        }
        header h1 { font-family: 'Lexend'; font-size: 1.1rem; letter-spacing: 1px; color: var(--neon); }

        /* --- TAB SYSTEM --- */
        .tab-bar {
            display: grid; grid-template-columns: 1fr 1fr;
            background: #000; padding: 5px; margin: 15px; border-radius: 12px;
            border: 1px solid var(--border);
        }
        .tab-btn {
            padding: 12px; border: none; background: transparent;
            color: #666; font-family: 'Lexend'; font-size: 0.8rem;
            font-weight: 600; cursor: pointer; border-radius: 8px;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: var(--card); color: var(--neon);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        /* --- CONTENT AREA --- */
        .container { padding: 0 15px; }

        .panel { display: none; animation: fadeIn 0.4s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        /* --- USER CARDS (Thay thế Table để không bị tràn màn hình) --- */
        .user-card {
            background: var(--card); border-radius: 15px;
            padding: 20px; margin-bottom: 15px;
            border: 1px solid var(--border);
            position: relative;
        }

        /* ĐƯA NÚT LÊN ĐẦU */
        .action-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 15px;
            padding-bottom: 15px; border-bottom: 1px dashed #222;
        }

        .btn-core {
            padding: 10px 18px; border-radius: 8px; border: none;
            font-family: 'Lexend'; font-size: 0.75rem; font-weight: 800;
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .btn-approve { background: var(--success); color: #000; }
        .btn-delete { background: var(--danger); color: #fff; }
        .btn-lock { background: #333; color: #fff; }

        /* INFO STYLE */
        .info-row { display: flex; flex-direction: column; gap: 5px; }
        .info-label { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .info-value { font-size: 0.95rem; font-weight: 600; color: #fff; }
        .phone-val { color: var(--neon); font-family: monospace; }

        /* Loader */
        .loader {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid #222; border-top-color: var(--neon); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to {transform: rotate(360deg);} }
    </style>
</head>
<body>

    <div class="loader" id="loader"><div class="spinner"></div></div>

    <header>
        <h1>ELITE COMMAND</h1>
        <button class="btn-core btn-lock" onclick="window.location.href='index.html'">EXIT</button>
    </header>

    <div class="tab-bar">
        <button class="tab-btn active" id="btn-pending" onclick="switchTab('pending')">PENDING (<span id="c-pending">0</span>)</button>
        <button class="tab-btn" id="btn-active" onclick="switchTab('active')">OPERATIONS (<span id="c-active">0</span>)</button>
    </div>

    <div class="container">
        <div id="panel-pending" class="panel active">
            <div id="list-pending">
                </div>
        </div>

        <div id="panel-active" class="panel">
            <div id="list-active">
                </div>
        </div>
    </div>

    <script>
        // 1. Cấu hình Database
        const SB_URL = "https://eyvfpinisvsrsipckmgv.supabase.co";
        const SB_KEY = "sb_publishable_I_610XtWjFtUFtvacEl8GQ_xDiV8lNV";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        // 2. Chuyển Tab
        function switchTab(tab) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('panel-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
        }

        // 3. Đồng bộ Dữ liệu
        async function sync() {
            const { data, error } = await _sb.from('accounts_vip').select('*').order('created_at', { ascending: false });
            if (!error) {
                renderPending(data.filter(u => !u.is_active));
                renderActive(data.filter(u => u.is_active));
                document.getElementById('c-pending').innerText = data.filter(u => !u.is_active).length;
                document.getElementById('c-active').innerText = data.filter(u => u.is_active).length;
                document.getElementById('loader').style.display = 'none';
            }
        }

        // 4. Render CHỜ DUYỆT (NÚT LÊN ĐẦU)
        function renderPending(users) {
            const container = document.getElementById('list-pending');
            container.innerHTML = users.length ? '' : '<p style="text-align:center; color:#555; margin-top:50px">Không có yêu cầu mới.</p>';
            
            users.forEach(u => {
                container.innerHTML += `
                    <div class="user-card">
                        <div class="action-header">
                            <span style="font-family:'Lexend'; color:#555; font-size:0.7rem">MỚI ĐĂNG KÝ</span>
                            <div style="display:flex; gap:10px">
                                <button class="btn-core btn-approve" onclick="action('${u.id}', true)">DUYỆT ✅</button>
                                <button class="btn-core btn-delete" onclick="remove('${u.id}')">XÓA</button>
                            </div>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Identifier</span>
                            <span class="info-value">${u.full_name.toUpperCase()}</span>
                            <span class="info-label" style="margin-top:10px">Access Data</span>
                            <span class="info-value phone-val">${u.phone} / PW: ${u.password}</span>
                        </div>
                    </div>
                `;
            });
        }

        // 5. Render QUẢN LÝ (NÚT LÊN ĐẦU)
        function renderActive(users) {
            const container = document.getElementById('list-active');
            container.innerHTML = '';
            
            users.forEach(u => {
                container.innerHTML += `
                    <div class="user-card" style="border-left: 4px solid var(--success)">
                        <div class="action-header">
                            <span style="color:var(--success); font-size:0.7rem; font-weight:800">● OPERATIONAL</span>
                            <div style="display:flex; gap:10px">
                                <button class="btn-core btn-lock" onclick="action('${u.id}', false)">KHÓA</button>
                                <button class="btn-core btn-delete" onclick="remove('${u.id}')">XÓA</button>
                            </div>
                        </div>
                        <div class="info-row">
                            <span class="info-value">${u.full_name.toUpperCase()}</span>
                            <span class="info-value phone-val">${u.phone}</span>
                        </div>
                    </div>
                `;
            });
        }

        // 6. Thao tác Logic
        async function action(id, status) {
            const { error } = await _sb.from('accounts_vip').update({ is_active: status }).eq('id', id);
            if (!error) {
                Swal.fire({ icon: 'success', title: status ? 'GRANTEED' : 'REVOKED', timer: 800, showConfirmButton: false, background: '#121215', color: '#fff' });
                sync();
            }
        }

        async function remove(id) {
            const res = await Swal.fire({
                title: 'TERMINATE?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff3e3e',
                confirmButtonText: 'DELETE',
                background: '#121215', color: '#fff'
            });

            if (res.isConfirmed) {
                const { error } = await _sb.from('accounts_vip').delete().eq('id', id);
                if (!error) sync();
            }
        }

        window.onload = sync;
    </script>
</body>
</html>
