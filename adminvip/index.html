<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS ADMIN | TAB SYSTEM</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=DynaPuff:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* CSS ARCHITECTURE: ADMIN-TAB-v900 */
        :root {
            --p-pink: #ffafcc; --s-pink: #ffc8dd; --accent: #ff4d6d;
            --success: #00b894; --warning: #f39c12; --dark: #2d3436;
            --glass: rgba(255, 255, 255, 0.98);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh; background: #fff5f8;
            font-family: 'Comfortaa', cursive; padding-bottom: 50px;
        }

        /* --- HEADER & TAB NAVIGATION --- */
        header {
            width: 100%; background: white; padding: 20px 5%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .admin-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-family: 'DynaPuff'; color: var(--accent); font-size: 1.8rem; }

        .tab-menu {
            display: flex; gap: 10px; background: #f0f0f0;
            padding: 8px; border-radius: 40px; width: fit-content; margin: 0 auto;
        }

        .tab-btn {
            padding: 12px 35px; border: none; border-radius: 35px;
            font-family: 'DynaPuff'; cursor: pointer; transition: 0.4s;
            background: transparent; color: #888; font-size: 0.9rem;
        }

        .tab-btn.active {
            background: var(--accent); color: white;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.3);
        }

        /* --- CONTAINER & TABLES --- */
        .container {
            width: 95%; max-width: 1300px; margin: 40px auto;
            background: var(--glass); border-radius: 50px;
            border: 8px solid white; box-shadow: 0 30px 60px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .panel { display: none; padding: 0; }
        .panel.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} }

        .table-head {
            padding: 30px 40px; background: #fff9fa; border-bottom: 2px solid #eee;
            display: flex; justify-content: space-between; align-items: center;
        }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 25px; text-align: left; background: #fafafa; color: #aaa; font-family: 'DynaPuff'; }
        td { padding: 20px 25px; border-bottom: 1px solid #f8f8f8; font-weight: 700; color: #444; }

        /* --- BUTTONS --- */
        .btn-action {
            padding: 10px 20px; border: none; border-radius: 20px;
            cursor: pointer; font-family: 'DynaPuff'; transition: 0.3s;
            color: white; font-size: 0.8rem;
        }
        .btn-approve { background: var(--success); }
        .btn-lock { background: var(--warning); }
        .btn-delete { background: var(--dark); }
        .btn-action:hover { transform: scale(1.1); filter: brightness(1.1); }

        /* --- LOADER --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div id="lottie-loading" style="width: 250px;"></div>
    </div>

    <header>
        <div class="admin-nav">
            <div class="logo">PANDA CONTROL 🐾</div>
            <button class="btn-action btn-delete" onclick="window.location.href='trangchu.html'">VỀ TRANG CHỦ</button>
        </div>

        <div class="tab-menu">
            <button class="tab-btn active" onclick="switchTab('waiting')">📌 CHỜ PHÊ DUYỆT (<span id="count-wait">0</span>)</button>
            <button class="tab-btn" onclick="switchTab('manage')">⚙️ QUẢN LÝ & XÓA (<span id="count-active">0</span>)</button>
        </div>
    </header>

    <div class="container">
        
        <div id="panel-waiting" class="panel active">
            <div class="table-head">
                <h2 style="font-family:'DynaPuff'; color: var(--accent);">DANH SÁCH ĐỢI BOSS</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Tên Boss</th>
                        <th>Số Điện Thoại</th>
                        <th>Mật Khẩu</th>
                        <th>Thao Tác</th>
                    </tr>
                </thead>
                <tbody id="body-waiting"></tbody>
            </table>
        </div>

        <div id="panel-manage" class="panel">
            <div class="table-head">
                <h2 style="font-family:'DynaPuff'; color: #555;">TẤT CẢ THÀNH VIÊN V.I.P</h2>
                <input type="text" id="searchBox" placeholder="Tìm tên hoặc SĐT..." style="padding: 10px 20px; border-radius: 20px; border: 1px solid #ddd;">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Tên Boss</th>
                        <th>Số Điện Thoại</th>
                        <th>Mật Khẩu</th>
                        <th>Trạng Thái</th>
                        <th>Quyền Hạn</th>
                    </tr>
                </thead>
                <tbody id="body-manage"></tbody>
            </table>
        </div>

    </div>

    <script>
        // 1. Kết nối Supabase
        const SB_URL = "https://eyvfpinisvsrsipckmgv.supabase.co";
        const SB_KEY = "sb_publishable_I_610XtWjFtUFtvacEl8GQ_xDiV8lNV";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        // 2. Lottie Loading
        lottie.loadAnimation({
            container: document.getElementById('lottie-loading'),
            renderer: 'svg', loop: true, autoplay: true,
            path: 'https://assets9.lottiefiles.com/packages/lf20_96bovdur.json'
        });

        // 3. Chuyển Tab
        function switchTab(tabName) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('panel-' + tabName).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 4. Lấy dữ liệu
        async function loadData() {
            const { data, error } = await _sb.from('accounts_vip').select('*').order('created_at', { ascending: false });
            if (!error) {
                renderWaiting(data.filter(u => !u.is_active));
                renderManage(data.filter(u => u.is_active));
                
                document.getElementById('count-wait').innerText = data.filter(u => !u.is_active).length;
                document.getElementById('count-active').innerText = data.filter(u => u.is_active).length;
                
                document.getElementById('loader').style.display = 'none';
            }
        }

        // 5. Render Tab 1 (Chờ duyệt)
        function renderWaiting(users) {
            const body = document.getElementById('body-waiting');
            body.innerHTML = users.length ? '' : '<tr><td colspan="4" style="text-align:center; padding: 50px; color:#aaa;">Không có ai đang chờ Boss duyệt hết! ✨</td></tr>';
            
            users.forEach(u => {
                body.innerHTML += `
                    <tr>
                        <td>${u.full_name}</td>
                        <td>${u.phone}</td>
                        <td>${u.password}</td>
                        <td>
                            <button class="btn-action btn-approve" onclick="updateStatus('${u.id}', true)">DUYỆT NGAY ✅</button>
                            <button class="btn-action btn-delete" style="margin-left:5px" onclick="deleteUser('${u.id}')">XÓA</button>
                        </td>
                    </tr>
                `;
            });
        }

        // 6. Render Tab 2 (Quản lý)
        function renderManage(users) {
            const body = document.getElementById('body-manage');
            body.innerHTML = '';
            
            users.forEach(u => {
                body.innerHTML += `
                    <tr>
                        <td>${u.full_name}</td>
                        <td>${u.phone}</td>
                        <td style="color:var(--accent)">${u.password}</td>
                        <td><span style="color:var(--success)">● ĐANG HOẠT ĐỘNG</span></td>
                        <td>
                            <button class="btn-action btn-lock" onclick="updateStatus('${u.id}', false)">KHÓA</button>
                            <button class="btn-action btn-delete" onclick="deleteUser('${u.id}')">XÓA VĨNH VIỄN 🗑️</button>
                        </td>
                    </tr>
                `;
            });
        }

        // 7. Cập nhật Status & Xóa
        async function updateStatus(id, status) {
            const { error } = await _sb.from('accounts_vip').update({ is_active: status }).eq('id', id);
            if (!error) {
                Swal.fire({ icon: 'success', title: status ? 'Đã duyệt!' : 'Đã khóa!', timer: 1000, showConfirmButton: false });
                loadData();
            }
        }

        async function deleteUser(id) {
            const result = await Swal.fire({
                title: 'XÓA KHỎI HỆ THỐNG?',
                text: "Boss chắc chắn muốn xóa vĩnh viễn chứ?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#2d3436',
                confirmButtonText: 'XÓA NGAY'
            });

            if (result.isConfirmed) {
                const { error } = await _sb.from('accounts_vip').delete().eq('id', id);
                if (!error) {
                    Swal.fire('Đã xóa!', '', 'success');
                    loadData();
                }
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
