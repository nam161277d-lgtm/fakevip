<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PANDA ELITE V5 - anh6.png</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --momo: #d82d8b; --bg: #0f0f12; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
        body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        
        .editor-card { background: #1a1a20; width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #25252d; border: 1px solid #333; border-radius: 10px; color: white; font-size: 15px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--momo); background: #2a2a35; }
        
        .btn { width: 100%; padding: 15px; background: var(--momo); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn:active { transform: scale(0.98); }

        .canvas-wrap { width: 100%; max-width: 380px; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 50px rgba(0,0,0,0.5); line-height: 0; }
        canvas { width: 100%; height: auto; }
    </style>
</head>
<body>

    <div class="editor-card">
        <div style="text-align: center; margin-bottom: 15px;">
            <h2 style="color: var(--momo); font-size: 1.1rem;">PANDA ELITE V5</h2>
            <p style="font-size: 9px; color: #666;">PHÔI GỐC: Anh6.png</p>
        </div>

        <div class="input-group">
            <label>Giờ iPhone</label>
            <input type="text" id="iptTime" placeholder="15:28">
        </div>
        <div class="input-group">
            <label>Số tiền hoàn trả</label>
            <input type="text" id="iptAmount" placeholder="1.938.038" oninput="app.formatMoney(this)">
        </div>
        <div class="input-group">
            <label>Họ và Tên</label>
            <input type="text" id="iptName" placeholder="NGUYEN VAN QUANG" oninput="this.value = this.value.toUpperCase(); app.render()">
        </div>
        <div class="input-group">
            <label>Mã QR xác minh</label>
            <input type="file" accept="image/*" onchange="app.handleQR(this)">
        </div>
        <button class="btn" onclick="app.download()">Tải ảnh kết quả</button>
    </div>

    <div class="canvas-wrap">
        <canvas id="mainCanvas"></canvas>
    </div>

    <script>
        const app = {
            canvas: document.getElementById('mainCanvas'),
            ctx: null,
            imgBase: new Image(),
            imgQR: new Image(),
            qrReady: false,

            config: {
                w: 1284, h: 2778, 
                textColor: "#303233", // Màu xám đen chuẩn MoMo
                // Tọa độ tinh chỉnh cho Anh3.png
                timePos: { x: 215, y: 100 }, 
                amountPos: { x: 241, y: 1638, size: 52 }, 
                namePos: { x: 241, y: 1840, size: 52 },  
                qr: { x: 642, y: 2105, size: 318 } 
            },

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.canvas.width = this.config.w;
                this.canvas.height = this.config.h;

                const now = new Date();
                document.getElementById('iptTime').value = now.getHours().toString().padStart(2, '0') + ':' + 
                                                          now.getMinutes().toString().padStart(2, '0');

                // Sử dụng ảnh Anh3.png như yêu cầu
                this.imgBase.src = 'Anh6.png'; 
                this.imgBase.onload = () => this.render();
                
                document.getElementById('iptTime').addEventListener('input', () => this.render());
            },

            formatMoney(input) {
                let v = input.value.replace(/\D/g, "");
                v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
                input.value = v;
                this.render();
            },

            handleQR(input) {
                if (input.files && input.files[0]) {
                    const r = new FileReader();
                    r.onload = (e) => { 
                        this.imgQR.src = e.target.result; 
                        this.imgQR.onload = () => { this.qrReady = true; this.render(); }; 
                    };
                    r.readAsDataURL(input.files[0]);
                }
            },

            render() {
                const { ctx, config, imgBase, imgQR, qrReady } = this;
                ctx.clearRect(0, 0, config.w, config.h);
                
                // 1. Vẽ phôi gốc Anh3.png
                ctx.drawImage(imgBase, 0, 0, config.w, config.h);

                // 2. Vẽ Giờ mới (Font iPhone Bold)
                const timeText = document.getElementById('iptTime').value;
                ctx.fillStyle = "#000000";
                ctx.textAlign = "center";
                ctx.font = "bold 46px -apple-system, BlinkMacSystemFont, sans-serif";
                ctx.fillText(timeText, config.timePos.x, config.timePos.y);

                // 3. Vẽ Thông tin Số tiền & Tên (Căn lề trái vào trong ô)
                ctx.textAlign = "left";
                ctx.fillStyle = config.textColor;
                
                // Số tiền
                ctx.font = "400 52px -apple-system, sans-serif";
                ctx.fillText(document.getElementById('iptAmount').value || "1.938.038", config.amountPos.x, config.amountPos.y);

                // Họ tên
                ctx.font = "bold 52px -apple-system, sans-serif";
                ctx.fillText(document.getElementById('iptName').value || "NGUYEN VAN QUANG", config.namePos.x, config.namePos.y);

                // 4. Vẽ QR Code
                if (qrReady) {
                    const s = config.qr.size;
                    // Căn giữa QR theo tọa độ thiết lập
                    ctx.drawImage(imgQR, config.qr.x - (s/2), config.qr.y - (s/2), s, s);
                }
            },

            download() {
                const link = document.createElement('a');
                link.download = `PANDA_EXPORT_${Date.now()}.png`;
                link.href = this.canvas.toDataURL('image/png', 1.0);
                link.click();
                Swal.fire({ icon: 'success', title: 'Đã lưu ảnh 4K!', showConfirmButton: false, timer: 1200 });
            }
        };
        window.onload = () => app.init();
    </script>
</body>
</html>
