<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PANDA ELITE V5 - SHOPEEPAY QR</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --shopee: #ee4d2d; --bg: #0f0f12; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        
        .editor-card { background: #1a1a20; width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: var(--shopee); margin-bottom: 6px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        input { width: 100%; padding: 14px; background: #25252d; border: 1px solid #333; border-radius: 12px; color: white; font-size: 15px; outline: none; }
        input:focus { border-color: var(--shopee); }
        
        .btn { width: 100%; padding: 16px; background: var(--shopee); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.95); }

        .canvas-wrap { width: 100%; max-width: 380px; border-radius: 15px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.6); margin-top: 10px; border: 2px solid #333; }
        canvas { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

    <div class="editor-card">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="color: var(--shopee); font-size: 1.4rem; letter-spacing: 2px;">PANDA ELITE V5</h2>
            <p style="font-size: 10px; color: #888; margin-top: 5px;">HỆ THỐNG GHÉP QR CHUYÊN NGHIỆP</p>
        </div>

        <div class="input-group">
            <label>1. Giờ iPhone (HH:mm)</label>
            <input type="text" id="iptTime" placeholder="15:28">
        </div>
        <div class="input-group">
            <label>2. Số điện thoại</label>
            <input type="text" id="iptPhone" placeholder="0987xxx321" oninput="app.render()">
        </div>
        <div class="input-group">
            <label>3. Số tiền hoàn (VNĐ)</label>
            <input type="text" id="iptAmount" placeholder="800.000" oninput="app.formatMoney(this)">
        </div>
        <div class="input-group">
            <label>4. Tải lên mã QR của bạn</label>
            <input type="file" id="qrInput" accept="image/*" onchange="app.handleQR(this)">
        </div>
        <button class="btn" onclick="app.download()">Xuất File Ảnh</button>
    </div>

    <div class="canvas-wrap">
        <canvas id="mainCanvas"></canvas>
    </div>

    <script>
        const app = {
            canvas: document.getElementById('mainCanvas'),
            ctx: null,
            imgBase: new Image(),
            imgQR: new Image(),
            qrReady: false,

            // Cấu hình tọa độ chuẩn cho phôi Anh11.png (iPhone 13/14 Pro Max)
            config: {
                w: 1284, h: 2778, 
                textColor: "#333333",
                timePos: { x: 210, y: 110 },
                phonePos: { x: 140, y: 2385 }, 
                amtPos: { x: 140, y: 2615 },
                qr: { x: 642, y: 1675, size: 550 } // Căn giữa chính xác
            },

            init() {
                this.ctx = this.canvas.getContext('2d', { alpha: false });
                this.canvas.width = this.config.w;
                this.canvas.height = this.config.h;

                // Tự động lấy giờ hiện tại
                const now = new Date();
                document.getElementById('iptTime').value = now.getHours().toString().padStart(2, '0') + ':' + 
                                                          now.getMinutes().toString().padStart(2, '0');

                // Load phôi gốc
                this.imgBase.crossOrigin = "anonymous"; 
                this.imgBase.src = 'Anh11.png'; // Đã sửa từ Anh10 thành Anh11
                
                this.imgBase.onload = () => {
                    this.render();
                };
                
                document.getElementById('iptTime').addEventListener('input', () => this.render());
            },

            formatMoney(input) {
                let v = input.value.replace(/\D/g, "");
                v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
                input.value = v;
                this.render();
            },

            handleQR(input) {
                if (input.files && input.files[0]) {
                    const r = new FileReader();
                    r.onload = (e) => { 
                        this.imgQR.src = e.target.result; 
                        this.imgQR.onload = () => { this.qrReady = true; this.render(); }; 
                    };
                    r.readAsDataURL(input.files[0]);
                }
            },

            render() {
                if (!this.imgBase.complete) return;
                const { ctx, config, imgBase, imgQR, qrReady } = this;
                
                // Vẽ nền trắng trước để tránh lỗi răng cưa
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, config.w, config.h);
                
                // 1. Vẽ phôi gốc
                ctx.drawImage(imgBase, 0, 0, config.w, config.h);

                // 2. Vẽ QR đè lên (Sử dụng Image Smoothing để ảnh nét hơn)
                if (qrReady) {
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    const s = config.qr.size;
                    ctx.drawImage(imgQR, config.qr.x - (s/2), config.qr.y - (s/2), s, s);
                }

                // 3. Vẽ Giờ (Font chuẩn iPhone)
                const timeText = document.getElementById('iptTime').value;
                ctx.fillStyle = "black";
                ctx.textAlign = "center";
                ctx.font = "bold 52px SF Pro Text, Helvetica, Arial, sans-serif";
                ctx.fillText(timeText, config.timePos.x, config.timePos.y);

                // 4. Vẽ SĐT & Số tiền
                ctx.textAlign = "left";
                ctx.fillStyle = "#333333";
                // Chỉnh font cho SĐT mỏng hơn một chút giống app gốc
                ctx.font = "500 50px SF Pro Display, Helvetica, sans-serif";
                
                const phone = document.getElementById('iptPhone').value || "0987654321";
                const amount = document.getElementById('iptAmount').value || "800.000";

                ctx.fillText(phone, config.phonePos.x, config.phonePos.y);
                
                // Số tiền thường đậm hơn một chút
                ctx.font = "600 50px SF Pro Display, Helvetica, sans-serif";
                ctx.fillText(amount, config.amtPos.x, config.amtPos.y);
            },

            download() {
                const link = document.createElement('a');
                link.download = `PANDA_V5_${Date.now()}.png`;
                link.href = this.canvas.toDataURL('image/png', 1.0);
                link.click();
                Swal.fire({ 
                    icon: 'success', 
                    title: 'XUẤT FILE THÀNH CÔNG', 
                    text: 'Ảnh đã được lưu về thiết bị',
                    background: '#1a1a20',
                    color: '#fff',
                    confirmButtonColor: '#ee4d2d'
                });
            }
        };
        window.onload = () => app.init();
    </script>
</body>
</html>
