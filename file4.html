<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PANDA ELITE - MOMO STYLE</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --momo: #d82d8b;
            --bg: #f5f5f7;
            --panel: #ffffff;
            --input-bg: #f9f9f9;
            --border: #eeeeee;
            --text-main: #303233; /* Màu chữ mẫu */
            --text-dim: #727272;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Lexend", sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text { font-weight: 800; color: var(--momo); font-size: 0.9rem; text-transform: uppercase; }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        .editor-card {
            background: var(--panel);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .input-box { margin-bottom: 15px; }
        .input-box label {
            display: block;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 6px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .input-box input {
            width: 100%;
            padding: 12px 15px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #333;
            font-size: 1rem;
            outline: none;
        }

        .btn-action {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--momo);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        .canvas-container {
            width: 90%;
            max-width: 380px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            line-height: 0;
        }

        canvas { width: 100%; height: auto; }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">Panda Editor Pro</div>
        <div style="font-size: 12px; color: #00c853;"><i class="fa-solid fa-circle"></i> Live</div>
    </header>

    <div class="container">
        <div class="editor-card">
            <div class="input-box">
                <label>Họ và tên khách hàng</label>
                <input type="text" id="name" placeholder="NGUYEN VAN A" oninput="this.value = this.value.toUpperCase(); app.render()">
            </div>
            
            <div class="input-box">
                <label>Số điện thoại / Số tiền</label>
                <input type="text" id="phone" placeholder="0399xxxxxx" oninput="app.render()">
            </div>

            <div class="input-box">
                <label>Tải lên mã QR</label>
                <input type="file" accept="image/*" onchange="app.handleQR(this)">
            </div>

            <button class="btn-action" onclick="app.download()">
                <i class="fa-solid fa-download"></i> TẢI ẢNH KẾT QUẢ
            </button>
        </div>
    </div>

    <div class="preview-section">
        <div class="canvas-container">
            <canvas id="mainCanvas"></canvas>
        </div>
    </div>

    <script>
        const app = {
            canvas: document.getElementById('mainCanvas'),
            ctx: null,
            imgBase: new Image(),
            imgQR: new Image(),
            qrReady: false,

            config: {
                w: 1284,
                h: 2778,
                // Chỉnh font theo phong cách iOS/MoMo
                fontBold: "bold 44px -apple-system, BlinkMacSystemFont, sans-serif",
                fontRegular: "400 42px -apple-system, BlinkMacSystemFont, sans-serif",
                color: "#303233", // Màu xám đen của code mẫu
                namePos: { x: 75, y: 1841 }, // Tọa độ (Bạn có thể điều chỉnh lại cho khớp phôi mới)
                phonePos: { x: 75, y: 1615 },
                qr: { x: 642, y: 1941, size: 325 }
            },

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.canvas.width = this.config.w;
                this.canvas.height = this.config.h;

                this.imgBase.src = 'B1914F97-A023-428C-8D8A-54D0FFC980AC.jpeg';
                this.imgBase.onload = () => this.render();
            },

            handleQR(input) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.imgQR.src = e.target.result;
                        this.imgQR.onload = () => {
                            this.qrReady = true;
                            this.render();
                        };
                    };
                    reader.readAsDataURL(input.files[0]);
                }
            },

            render() {
                const { ctx, config, imgBase, imgQR, qrReady } = this;
                
                ctx.clearRect(0, 0, config.w, config.h);
                ctx.drawImage(imgBase, 0, 0, config.w, config.h);

                const nameText = document.getElementById('name').value.toUpperCase();
                const phoneText = document.getElementById('phone').value;
                
                // 1. Vẽ Giờ (StatusBar) - Kiểu iOS
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ':' + 
                                now.getMinutes().toString().padStart(2, '0');
                
                ctx.fillStyle = "#000000";
                ctx.font = "bold 46px -apple-system, sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(timeStr, 170, 95);

                // 2. Vẽ Thông tin (Theo màu code mẫu)
                ctx.textAlign = "left"; // Chuyển về căn trái như code mẫu
                ctx.fillStyle = config.color;

                // Vẽ Số điện thoại
                ctx.font = config.fontRegular;
                ctx.fillText(phoneText, config.phonePos.x, config.phonePos.y);

                // Vẽ Họ tên (Bold)
                ctx.font = config.fontBold;
                ctx.fillText(nameText, config.namePos.x, config.namePos.y);

                // 3. Vẽ QR Code
                if (qrReady) {
                    const s = config.qr.size;
                    const x = config.qr.x - (s / 2);
                    const y = config.qr.y;
                    ctx.drawImage(imgQR, x, y, s, s);
                }
            },

            download() {
                const link = document.createElement('a');
                link.download = `PANDA_${Date.now()}.png`;
                link.href = this.canvas.toDataURL('image/png', 1.0);
                link.click();
                Swal.fire({ icon: 'success', title: 'Đã tải ảnh!', timer: 1500 });
            }
        };

        window.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
