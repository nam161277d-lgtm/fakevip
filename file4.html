<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Interface Editor - Final Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        /* --- RESET & CHUẨN VIP --- */
        :root {
            --bg-color: #f0f3f7;
            --text-color: #333;
            --premium-color: #d81b60; /* Màu hồng VIP */
            --premium-gradient: linear-gradient(135deg, #ff4081, #d81b60);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow-soft: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
            --shadow-hard: 10px 10px 30px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-color);
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .main-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 30px;
            padding: 20px;
        }

        /* --- IPHONE MOCKUP (Vùng Preview Sắc Nét) --- */
        .iphone-mockup {
            position: relative;
            width: 375px; height: 812px; /* Kích thước iPhone X/11 */
            background: #1a1a1a;
            border-radius: 50px;
            padding: 10px;
            box-shadow: 20px 20px 60px #d1d9e6, -20px -20px 60px #ffffff, inset 0 0 10px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .notch {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 210px; height: 30px; background: #1a1a1a;
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
            z-index: 10;
        }

        .screen-content {
            position: relative;
            width: 100%; height: 100%;
            background: white;
            border-radius: 40px;
            overflow: hidden;
        }

        .base-image {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* --- LỚP THÔNG TIN VIP (Căn chỉnh chính xác) --- */
        .info-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        .text-item {
            position: absolute;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-weight: 500; /* Medium weight */
            color: #4a4a4a; /* Màu xám đặc trưng iOS */
            font-size: 19px;
            text-align: left;
        }

        .text-shadow {
            text-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        /* TỌA ĐỘ CUỐI CÙNG (VIP): Căn chỉnh chính xác cho ims.png */
        #text-amount { 
            top: 57.8%; /* Căn theo chiều dọc */
            left: 24.5%; /* Căn theo chiều ngang */
            font-size: 20px;
        }
        
        #text-name { 
            top: 64.9%; 
            left: 24.5%; 
            font-size: 19px;
            color: #555;
        }

        /* CĂN CHỈNH QR CODE: Nằm đúng khung vuông */
        #qrcode-container {
            position: absolute;
            top: 72.0%; /* Căn theo chiều dọc */
            left: 50%; /* Nằm giữa */
            transform: translateX(-50%);
            padding: 5px;
            background: rgba(255, 255, 255, 0.95); /* Viền trắng QR */
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex; justify-content: center; align-items: center;
        }

        #qrcode-container canvas, #qrcode-container img {
            width: 135px !important; /* Kích thước QR (VIP) */
            height: 135px !important;
        }

        /* --- CONTROL PANEL (VIP Style) --- */
        .control-panel {
            background-color: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            width: 360px;
            border-radius: 30px;
            padding: 25px;
            box-shadow: var(--shadow-soft);
            display: flex; flex-direction: column; gap: 20px;
        }

        .panel-header { text-align: center; }
        .premium-badge {
            display: inline-block;
            background: var(--premium-gradient);
            color: white;
            padding: 3px 10px;
            font-size: 10px; font-weight: bold;
            border-radius: 50px;
            margin-bottom: 5px;
        }
        .panel-header h2 { font-size: 20px; margin: 0; }
        .panel-header p { font-size: 12px; color: #777; margin: 5px 0 0; }

        .forms-container { display: flex; flex-direction: column; gap: 15px; }

        .input-block label {
            display: block; font-size: 11px; font-weight: bold; margin-bottom: 7px; color: #555;
            text-transform: uppercase; letter-spacing: 1px;
        }

        input {
            width: 100%; padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(0,0,0,0.05);
            background: #fdfdfd;
            box-shadow: inset 2px 2px 5px #e0e6ed, inset -2px -2px 5px #ffffff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none; border-color: rgba(255, 64, 129, 0.3);
            box-shadow: inset 2px 2px 5px #e0e6ed, inset -2px -2px 5px #ffffff, 0 0 10px rgba(216, 27, 96, 0.1);
        }

        .chip-group {
            display: flex; gap: 8px; margin-top: 10px;
        }

        .chip {
            padding: 8px 15px;
            background-color: white;
            color: var(--premium-color);
            border: 1px solid #fce4ec;
            border-radius: 50px;
            font-size: 12px; font-weight: 600;
            cursor: pointer;
            box-shadow: 2px 2px 5px #d1d9e6, -2px -2px 5px #ffffff;
            transition: all 0.2s ease;
        }

        .chip:hover {
            transform: translateY(-2px);
            box-shadow: 4px 4px 10px #d1d9e6, -4px -4px 10px #ffffff;
        }

        .chip:active {
            box-shadow: inset 1px 1px 3px #d1d9e6, inset -1px -1px 3px #ffffff;
            transform: translateY(0);
        }

        /* --- NÚT TẢI PNG VIP --- */
        .action-zone { margin-top: 10px; }

        .btn {
            width: 100%; padding: 18px;
            border-radius: 20px;
            border: none;
            font-size: 16px; font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .btn-premium {
            background: var(--premium-gradient);
            color: white;
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.3);
        }

        .btn-premium:hover {
            box-shadow: 0 8px 25px rgba(216, 27, 96, 0.4);
            transform: translateY(-3px);
        }

        .btn-premium:active {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(216, 27, 96, 0.3);
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="iphone-mockup">
            <div class="notch"></div>
            <div class="screen-content" id="capture-area">
                <img src="B1914F97-A023-428C-8D8A-54D0FFC980AC.jpeg" alt="Nền B1914F97-A023-428C-8D8A-54D0FFC980AC.jpeg" class="base-image">
                
                <div class="info-overlay">
                    <div id="text-amount" class="text-item premium-font text-shadow">500.000đ</div>
                    <div id="text-name" class="text-item premium-font text-shadow">NGUYỄN VĂN A</div>
                    
                    <div id="qrcode-container"></div>
                </div>
            </div>
        </div>

        <div class="control-panel glassmorphism">
            <header class="panel-header">
                <div class="premium-badge">PREMIUM</div>
                <h2>Trình chỉnh sửa VIP</h2>
                <p>Nhập thông tin, ảnh sẽ tự động cập nhật.</p>
            </header>

            <div class="forms-container">
                <div class="input-block">
                    <label for="input-amount">SỐ TIỀN HOÀN TRẢ</label>
                    <input type="text" id="input-amount" placeholder="VD: 500.000đ" oninput="updatePremiumPreview()">
                    <div class="chip-group">
                        <button class="chip" onclick="setPremiumAmount('100.000đ')">100k</button>
                        <button class="chip" onclick="setPremiumAmount('200.000đ')">200k</button>
                        <button class="chip" onclick="setPremiumAmount('500.000đ')">500k</button>
                    </div>
                </div>

                <div class="input-block">
                    <label for="input-name">HỌ VÀ TÊN</label>
                    <input type="text" id="input-name" placeholder="Nhập tên..." oninput="updatePremiumPreview()">
                </div>
                
                <div class="input-block">
                    <label for="input-qr">NỘI DUNG QR CODE</label>
                    <input type="text" id="input-qr" placeholder="Nhập nội dung mã QR..." oninput="updateQRPreview()">
                </div>
            </div>

            <div class="action-zone">
                <button class="btn btn-premium" onclick="downloadVIPImage()">
                    <span>📥 Tải PNG Đẳng Cấp 3x Sắc Nét</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Cập nhật thông tin mượt mà khi gõ
        function updatePremiumPreview() {
            const inputAmount = document.getElementById('input-amount').value;
            const inputName = document.getElementById('input-name').value;
            
            // Đồng bộ Amount
            const textAmount = document.getElementById('text-amount');
            if (textAmount) {
                textAmount.innerText = inputAmount || '500.000đ';
            }
            
            // Đồng bộ Name (Chuyển thành chữ IN HOA)
            const textName = document.getElementById('text-name');
            if (textName) {
                textName.innerText = inputName.toUpperCase() || 'NGUYỄN VĂN A';
            }
        }

        // Chức năng nút gợi ý số tiền
        function setPremiumAmount(val) {
            const inputAmount = document.getElementById('input-amount');
            if (inputAmount) {
                inputAmount.value = val;
                updatePremiumPreview(); // Cập nhật ảnh ngay lập tức
            }
        }

        // TẠO QR CODE TỰ ĐỘNG
        let qrCodeInstance = null;
        function generateQRCode(text) {
            const container = document.getElementById("qrcode-container");
            container.innerHTML = ""; // Xóa QR cũ
            
            qrCodeInstance = new QRCode(container, {
                text: text || "https://premium.example.com/verify", // Link mặc định VIP
                width: 140, // Độ lớn QR tương đối
                height: 140,
                colorDark : "#333", // Màu đen mượt
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H // Độ chính xác cao nhất
            });
        }

        // Cập nhật QR khi nhập ô nội dung
        function updateQRPreview() {
            const qrText = document.getElementById('input-qr').value;
            generateQRCode(qrText);
        }

        // Gọi tạo QR mặc định khi trang web load
        window.addEventListener('load', () => {
            generateQRCode("https://premium.example.com/verify"); // Bạn có thể thay đổi link mặc định này
        });

        // CHỤP ẢNH ĐẲNG CẤP 3X - SẮC NÉT HOÀN HẢO
        function downloadVIPImage() {
            const area = document.getElementById('capture-area');
            
            // Thông báo bắt đầu (Bạn có thể thêm spinner nếu muốn)
            console.log("Đang khởi tạo canvas VIP...");
            
            html2canvas(area, {
                scale: 3, // Tăng độ nét gấp 3 lần (Premium)
                useCORS: true, // Hỗ trợ tải ảnh từ nguồn khác
                backgroundColor: null, // Giữ nền trong suốt nếu ảnh gốc có
                logging: false // Tắt log để mượt hơn
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'premium-edited-final-' + Date.now() + '.png'; // Đặt tên file VIP
                link.href = canvas.toDataURL("image/png");
                link.click();
                
                console.log("Tải ảnh VIP thành công!");
            });
        }
    </script>
</body>
</html>
