<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PANDA ELITE - REFUND GENERATOR</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --momo: #d82d8b;
            --bg: #0f0f12;
            --panel: #1c1c21;
            --input-bg: #25252d;
            --border: #33333d;
            --text-main: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Lexend', sans-serif; }

        body {
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .editor-card {
            background: var(--panel);
            width: 100%;
            max-width: 450px;
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; font-weight: 700; }
        
        input {
            width: 100%;
            padding: 14px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            border: 1px solid transparent;
        }

        input:focus { border-color: var(--momo); }

        .btn-download {
            width: 100%;
            padding: 16px;
            background: var(--momo);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .canvas-wrap {
            width: 100%;
            max-width: 380px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            line-height: 0;
        }

        canvas { width: 100%; height: auto; }
    </style>
</head>
<body>

    <div class="editor-card">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="color: var(--momo); font-size: 1.2rem;">PANDA ELITE V5</h2>
            <p style="font-size: 10px; color: #666;">REFUND MODE • AUTO TIME CLEANER</p>
        </div>

        <div class="input-group">
            <label>Giờ iPhone</label>
            <input type="text" id="iptTime" placeholder="15:22">
        </div>

        <div class="input-group">
            <label>Số tiền hoàn trả</label>
            <input type="text" id="iptAmount" placeholder="1.938.038" oninput="app.formatMoney(this)">
        </div>

        <div class="input-group">
            <label>Họ và Tên</label>
            <input type="text" id="iptName" placeholder="NGUYEN VAN QUANG" oninput="this.value = this.value.toUpperCase(); app.render()">
        </div>

        <div class="input-group">
            <label>Mã QR xác thực</label>
            <input type="file" accept="image/*" onchange="app.handleQR(this)">
        </div>

        <button class="btn-download" onclick="app.download()">Tải ảnh kết quả</button>
    </div>

    <div class="canvas-wrap">
        <canvas id="mainCanvas"></canvas>
    </div>

    <script>
        const app = {
            canvas: document.getElementById('mainCanvas'),
            ctx: null,
            imgBase: new Image(),
            imgQR: new Image(),
            qrReady: false,

            config: {
                w: 1284,
                h: 2778,
                textColor: "#303233", // Màu xám đen chuẩn MoMo
                fontMain: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif",
                // Tọa độ điều chỉnh theo phôi 1284x2778
                timePos: { x: 215, y: 95 }, 
                amountPos: { x: 135, y: 1442 }, 
                namePos: { x: 135, y: 1568 },  
                qr: { x: 642, y: 1680, size: 360 } 
            },

            init() {
                this.ctx = this.canvas.getContext('2d');
                this.canvas.width = this.config.w;
                this.canvas.height = this.config.h;

                // Set giờ hiện tại
                const now = new Date();
                document.getElementById('iptTime').value = now.getHours().toString().padStart(2, '0') + ':' + 
                                                          now.getMinutes().toString().padStart(2, '0');

                this.imgBase.src = 'B1914F97-A023-428C-8D8A-54D0FFC980AC.jpeg';
                this.imgBase.onload = () => this.render();

                document.getElementById('iptTime').addEventListener('input', () => this.render());
            },

            // Tự động thêm dấu chấm khi nhập số tiền
            formatMoney(input) {
                let value = input.value.replace(/\D/g, "");
                value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
                input.value = value;
                this.render();
            },

            handleQR(input) {
                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.imgQR.src = e.target.result;
                        this.imgQR.onload = () => { this.qrReady = true; this.render(); };
                    };
                    reader.readAsDataURL(input.files[0]);
                }
            },

            render() {
                const { ctx, config, imgBase, imgQR, qrReady } = this;
                ctx.clearRect(0, 0, config.w, config.h);
                
                // 1. Vẽ phôi gốc
                ctx.drawImage(imgBase, 0, 0, config.w, config.h);

                // 2. XOÁ GIỜ CŨ TRÊN PHÔI (Vùng trắng/xám trên Status Bar)
                ctx.fillStyle = "#f3f3f3"; // Màu nền thanh trạng thái (điều chỉnh nếu phôi màu khác)
                ctx.fillRect(80, 40, 260, 80); 

                // 3. Vẽ Giờ mới (Hệ thống)
                const timeText = document.getElementById('iptTime').value;
                ctx.fillStyle = "#000000";
                ctx.textAlign = "center";
                ctx.font = `bold 48px ${config.fontMain}`;
                ctx.fillText(timeText, config.timePos.x, config.timePos.y);

                // 4. Vẽ Thông tin Số tiền & Tên
                const amountText = document.getElementById('iptAmount').value || "0";
                const nameText = document.getElementById('iptName').value || "";

                ctx.textAlign = "left";
                ctx.fillStyle = config.textColor;

                // Vẽ Số tiền
                ctx.font = `400 44px ${config.fontMain}`;
                ctx.fillText(amountText, config.amountPos.x, config.amountPos.y);

                // Vẽ Họ tên
                ctx.font = `bold 44px ${config.fontMain}`;
                ctx.fillText(nameText, config.namePos.x, config.namePos.y);

                // 5. Vẽ QR
                if (qrReady) {
                    const s = config.qr.size;
                    ctx.drawImage(imgQR, config.qr.x - (s/2), config.qr.y, s, s);
                }
            },

            download() {
                const link = document.createElement('a');
                link.download = `REFUND_${Date.now()}.png`;
                link.href = this.canvas.toDataURL('image/png', 1.0);
                link.click();
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
